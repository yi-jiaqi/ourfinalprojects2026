/* ================= GAME STATE ================= */

let discovered = new Set(BASE_ITEMS);
let selected = [];
  let candyDrops = 0; // optional counter
  function saveGame() {
  localStorage.setItem(
    "infinite_catft_save",
    JSON.stringify([...discovered])
  );
}
  function loadGame() {
  const data = localStorage.getItem("infinite_catft_save");
  if (data) {
    discovered = new Set(JSON.parse(data));
  }
}




/* ================= UI ================= */

function renderItems() {
  const itemsDiv = document.getElementById("items");
  itemsDiv.innerHTML = "";

  [...discovered].sort().forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    if (selected.includes(item)) div.classList.add("selected");

    div.textContent = withEmoji(item);

    div.onclick = () => {
  if (item === "Candy") {
    useCandyDrop();
  } else if (item === "Chocolate") {
    useChocolateDrop();
  } else if (item === "Red Envelope") {
    useRedEnvelope();
  } else {
    toggleSelect(item);
  }
};



    itemsDiv.appendChild(div); // ← YOU WERE MISSING THIS
  });
}


function renderSelected() {
  document.getElementById("selected").innerText =
    selected.map(withEmoji).join(" + ");
}

/* ================= LOGIC ================= */

function toggleSelect(item) {
  if (selected.length < 2) {
    selected.push(item);
  } else {
    // If already 2 selected, reset and start fresh
    selected = [item];
  }
  renderItems();
  renderSelected();
}


function craft() {
  if (selected.length !== 2) return;
  const [a, b] = selected;
  const result = RECIPES[`${a}+${b}`] || RECIPES[`${b}+${a}`];
  const resultDiv = document.getElementById("result");

    
  if (result) {
    discovered.add(result);
    saveGame();
    resultDiv.textContent = `✨ You made ${withEmoji(result)}!`;

    // Chocolate drop chance on successful craft
    if (Math.random() < 0.1 && !discovered.has("Chocolate")) {
      discovered.add("Chocolate");
      saveGame();
      resultDiv.textContent += " 🍫 You found a Chocolate!";
    }

  } else {
    resultDiv.textContent = "❌ Nothing happened...";

    // Candy drop on failed craft
    if (Math.random() < 0.1 && !discovered.has("Candy")) {
      discovered.add("Candy");
      saveGame();
      resultDiv.textContent += " 🍬 You found a Candy!";
    }
  }
  // 🧧 Lunar New Year drop condition
const LNY_CATS = ["Catft", "Cube", "CatGPT", "Dev", "Chonker", "Candace", "Carter", "Pumpkin", "Prince", "Phoenix", "Pumpchi", "Mochi", "Mocha", "Michael", "Peanut", "Pearl", "Parker", "Peaskers", "Whiskers", "Winston", "Winter", "Sushi", "Scarlet", "Samuel"];

if (
  LNY_CATS.includes(result) &&
  Math.random() < 0.05 && // 5% feels festive
  !discovered.has("Red Envelope")
) {
  discovered.add("Red Envelope");
  saveGame();
  resultDiv.textContent += " 🧧 You received a Red Envelope!";
}





  selected = [];
  renderItems();
  renderSelected();
}

// Use chocolate like candy
function useChocolateDrop() {
  discovered.delete("Chocolate"); // consume chocolate

  const allResults = [...new Set(Object.values(RECIPES))];
  const locked = allResults.filter(
    r => !discovered.has(r) && !BASE_ITEMS.includes(r)
  );

  if (locked.length === 0) {
    document.getElementById("result").textContent =
      "🍫 The chocolate melts... nothing new remains.";
    saveGame();
    renderItems();
    return;
  }

  const reward = locked[Math.floor(Math.random() * locked.length)];
  discovered.add(reward);
  saveGame();

  document.getElementById("result").textContent =
    `🍫 Chocolate Drop unlocked ${withEmoji(reward)}!`;

  renderItems();
}
  function useCandyDrop() {
  discovered.delete("Candy"); // consume candy

  const allResults = [...new Set(Object.values(RECIPES))];
  const locked = allResults.filter(
    r => !discovered.has(r) && !BASE_ITEMS.includes(r)
  );

  if (locked.length === 0) {
    document.getElementById("result").textContent =
      "🍬 The candy dissolves... nothing new remains.";
    saveGame();
    renderItems();
    return;
  }

  const reward = locked[Math.floor(Math.random() * locked.length)];
  discovered.add(reward);
  saveGame();

  document.getElementById("result").textContent =
    `🍬 Candy Drop unlocked ${withEmoji(reward)}!`;

  renderItems();
}
  function useRedEnvelope() {
  discovered.delete("Red Envelope"); // consume it

  const allResults = [...new Set(Object.values(RECIPES))];

  const locked = allResults.filter(
    r => !discovered.has(r) && !BASE_ITEMS.includes(r)
  );

  if (locked.length === 0) {
    document.getElementById("result").textContent =
      "🧧 The envelope opens… but you've already found everything.";
    saveGame();
    renderItems();
    return;
  }

  const reward = locked[Math.floor(Math.random() * locked.length)];
  discovered.add(reward);
  saveGame();

  document.getElementById("result").textContent =
    `🧧 Lucky! The Red Envelope revealed ${withEmoji(reward)}!`;

  renderItems();
}
